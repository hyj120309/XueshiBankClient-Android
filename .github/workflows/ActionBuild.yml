name: Android CI

on: 
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    # - name: Git clone BiliClient
    #   run: cd .. && sudo rm -rf action_build_biliclient && git clone -b develop https://gitee.com/RobinNotBad/BiliClient.git action_build_biliclient
    # - name: ls
    #   run: ls -l /home/runner/work/action_build_biliclient/action_build_biliclient
    - uses: actions/checkout@v4
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: mkdir
      run: mkdir out
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Build with Gradle
      run: |
          ./gradlew :app:assembleRelease
    - name: Sign releaseAPK
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        output: build/release/signed
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "30.0.2"
    - name: Upload APK(debug)
      uses: actions/upload-artifact@v4
      with:
          name: app
          path: |
            app/build/outputs/apk/release/*
            build/release/signed/*